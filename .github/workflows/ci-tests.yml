name: CI Tests

# Tier-1 + tier-2 tests on every PR. CI uses the same Claude model defaults a
# real user gets (no model override) to test what users actually experience.
# Tier-3 E2E stays manual (too expensive per PR, and the skill-E2E variants
# need gh admin scopes we don't want to grant CI).
#
# Fork PRs: the tier-1 step will fail because GitHub doesn't expose
# CLAUDE_CODE_OAUTH_TOKEN to fork-originated runs. Maintainers cherry-pick
# fork changes onto a branch in this repo to get a clean pass.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier-2:
    # Tier-2 (invariants): pure file/grep, no Claude CLI. Runs in parallel
    # with tier-1 so a broken invariant surfaces instantly.
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Tier-2 invariants
        run: bash ./tests/test-invariants.sh

  tier-1:
    # Tier-1 fan-out: each skill-description test runs in its own job,
    # parallel with the others. Wall-clock = max(the three) instead of
    # sum(the three). fail-fast: false lets every failing test surface
    # its own diagnostics in one run.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        test:
          - test-discover-workflows.sh
          - test-install-workflow.sh
          - test-install-agent-team.sh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache npm download store
        # Trims 5-10s off `npm install -g` by reusing the package tarball
        # across runs. Cache key is content-addressed by OS only — we always
        # install the latest @anthropic-ai/claude-code; on miss, we just
        # pay the full install once and populate cache for next time.
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-claude-code

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run ${{ matrix.test }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: ./tests/run-tests.sh --test "${{ matrix.test }}" --verbose
